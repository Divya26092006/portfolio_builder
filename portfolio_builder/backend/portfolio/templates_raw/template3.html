<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>{{NAME}} - Portfolio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: 'Inter', sans-serif; 
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 40px 20px;
    }
    .profile-card {
      max-width: 900px;
      margin: 0 auto;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(20px);
      border-radius: 24px;
      padding: 40px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.1);
    }
    .hero { text-align: center; margin-bottom: 40px; }
    .hero h1 { font-size: 2.8rem; background: linear-gradient(45deg, #667eea, #764ba2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 12px; }
    .hero p { color: #64748b; font-size: 1.1rem; }
    .content-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 32px; }
    .card { background: rgba(255,255,255,0.8); border-radius: 16px; padding: 24px; border: 1px solid rgba(255,255,255,0.2); }
    .card h3 { color: #1e293b; margin-bottom: 16px; font-size: 1.2rem; }
    .tag { display: inline-block; background: linear-gradient(45deg, #667eea, #764ba2); color: white; padding: 6px 16px; border-radius: 20px; font-size: 0.85rem; margin: 4px 4px 4px 0; }
    .project-card { background: rgba(102, 126, 234, 0.1); border-left: 4px solid #667eea; padding: 16px; border-radius: 12px; margin-bottom: 12px; }
    .contact { text-align: center; padding-top: 24px; border-top: 1px solid rgba(0,0,0,0.1); }
    .contact a { color: #667eea; text-decoration: none; font-weight: 500; }
    @media (max-width: 768px) { .content-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="profile-card">
    <div class="hero">
      <h1>{{NAME}}</h1>
      <p>{{TAGLINE}}</p>
    </div>
    
    <div class="content-grid">
      <div class="card">
        <h3>About</h3>
        <p>{{ABOUT}}</p>
      </div>
      
      <div class="card">
        <h3>Contact</h3>
        <p><a href="mailto:{{EMAIL}}">{{EMAIL}}</a></p>
      </div>
    </div>
    
    <div class="card">
      <h3>Skills</h3>
      <div>{{SKILLS}}</div>
    </div>
    
    <div class="card">
      <h3>Projects</h3>
      <div>{{PROJECTS}}</div>
    </div>
  </div>
</body>
</html>
