<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>{{NAME}} - Portfolio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: white;
      color: #333;
      padding: 80px 40px;
      max-width: 800px;
      margin: 0 auto;
    }
    h1 { font-size: 3rem; font-weight: 700; margin-bottom: 8px; letter-spacing: -0.02em; }
    h2 { font-size: 1.4rem; font-weight: 600; margin: 32px 0 20px 0; color: #111; }
    p { margin-bottom: 16px; line-height: 1.7; }
    .tag { display: inline-block; background: #f3f4f6; color: #374151; padding: 4px 12px; border-radius: 12px; font-size: 0.85rem; margin: 2px; }
    .project { padding: 20px; border-bottom: 1px solid #f3f4f6; }
    .email { font-size: 1.1rem; color: #3b82f6; text-decoration: none; }
  </style>
</head>
<body>
  <h1>{{NAME}}</h1>
  <p style="font-size: 1.2rem; color: #6b7280; margin-bottom: 48px;">{{TAGLINE}}</p>
  
  <div>
    <h2>About</h2>
    <p>{{ABOUT}}</p>
  </div>
  
  <div>
    <h2>Skills</h2>
    <div>{{SKILLS}}</div>
  </div>
  
  <div>
    <h2>Projects</h2>
    <div>{{PROJECTS}}</div>
  </div>
  
  <div style="margin-top: 48px;">
    <p><a href="mailto:{{EMAIL}}" class="email">{{EMAIL}}</a></p>
  </div>
</body>
</html>
