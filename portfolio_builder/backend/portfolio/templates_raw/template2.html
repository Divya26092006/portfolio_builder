<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>{{NAME}} - Portfolio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f3f4f6;
      color: #111827;
      padding: 40px 16px;
    }
    .shell {
      max-width: 1100px;
      margin: 0 auto;
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 15px 40px rgba(15, 23, 42, 0.15);
      overflow: hidden;
      display: grid;
      grid-template-columns: minmax(260px, 320px) 1fr;
      min-height: 520px;
    }
    .sidebar {
      background: linear-gradient(180deg, #2563eb, #1d4ed8);
      color: #e5e7eb;
      padding: 32px 24px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    .avatar-circle {
      width: 96px;
      height: 96px;
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      font-weight: 700;
      margin-bottom: 16px;
    }
    .sidebar h1 {
      font-size: 1.8rem;
      margin-bottom: 4px;
    }
    .sidebar p {
      font-size: 0.95rem;
      color: #d1d5db;
    }
    .sidebar-footer {
      font-size: 0.9rem;
      color: #d1d5db;
    }
    .sidebar-footer strong {
      color: #ffffff;
    }
    .main {
      padding: 28px 28px 32px 28px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .block {
      border-radius: 12px;
      border: 1px solid #e5e7eb;
      padding: 18px 18px 16px 18px;
    }
    .block h2 {
      font-size: 1.1rem;
      margin-bottom: 8px;
      color: #111827;
    }
    .block p {
      font-size: 0.95rem;
      line-height: 1.6;
      color: #4b5563;
    }
    .pill-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 6px;
    }
    .pill {
      padding: 6px 12px;
      border-radius: 999px;
      background: #eff6ff;
      color: #1d4ed8;
      font-size: 0.85rem;
      border: 1px solid #dbeafe;
    }
    .project-item {
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid #e5e7eb;
      margin-bottom: 8px;
      font-size: 0.9rem;
      background: #f9fafb;
    }
    .contact-line {
      font-size: 0.95rem;
      color: #374151;
    }
    .contact-line a {
      color: #2563eb;
      text-decoration: none;
    }
    .contact-line a:hover {
      text-decoration: underline;
    }
    @media (max-width: 800px) {
      .shell {
        grid-template-columns: 1fr;
      }
      .sidebar {
        flex-direction: row;
        align-items: center;
        gap: 16px;
      }
      .sidebar-footer {
        text-align: right;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <aside class="sidebar">
      <div>
        <div class="avatar-circle">
          {{INITIALS}}
        </div>
        <h1>{{NAME}}</h1>
        <p>{{TAGLINE}}</p>
      </div>
      <div class="sidebar-footer">
        <p><strong>Email:</strong> {{EMAIL}}</p>
      </div>
    </aside>
    <main class="main">
      <section class="block">
        <h2>About</h2>
        <p>{{ABOUT}}</p>
      </section>
      <section class="block">
        <h2>Skills</h2>
        <div class="pill-list">
          {{SKILLS}}
        </div>
      </section>
      <section class="block">
        <h2>Projects</h2>
        <div>
          {{PROJECTS}}
        </div>
      </section>
    </main>
  </div>
</body>
</html>
