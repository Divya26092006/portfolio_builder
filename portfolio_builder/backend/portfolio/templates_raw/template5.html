<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>{{NAME}} - Portfolio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: 'Poppins', sans-serif; 
      background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
      min-height: 100vh;
      padding: 40px 20px;
    }
    .glass-container {
      max-width: 1000px; margin: 0 auto;
      background: rgba(255, 255, 255, 0.25);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      padding: 40px;
      box-shadow: 0 8px 32px rgba(31, 38, 135, 0.37);
    }
    .hero { text-align: center; margin-bottom: 40px; }
    .hero h1 { font-size: 3rem; color: #1e293b; margin-bottom: 10px; }
    .glass-card {
      background: rgba(255, 255, 255, 0.2);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 20px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      backdrop-filter: blur(10px);
    }
    .glass-tag {
      display: inline-block;
      background: rgba(255, 255, 255, 0.3);
      color: #1e293b;
      padding: 8px 16px;
      border-radius: 25px;
      margin: 6px;
      backdrop-filter: blur(10px);
    }
    .project-glass {
      background: rgba(255, 255, 255, 0.15);
      border-left: 4px solid rgba(30, 41, 59, 0.5);
      padding: 16px;
      border-radius: 12px;
      margin-bottom: 12px;
    }
  </style>
</head>
<body>
  <div class="glass-container">
    <div class="hero">
      <h1>{{NAME}}</h1>
      <p style="font-size: 1.2rem; color: #475569;">{{TAGLINE}}</p>
    </div>
    
    <div class="glass-card">
      <h2 style="color: #1e293b; margin-bottom: 16px;">About</h2>
      <p style="line-height: 1.7; color: #64748b;">{{ABOUT}}</p>
    </div>
    
    <div class="glass-card">
      <h2 style="color: #1e293b; margin-bottom: 16px;">Skills</h2>
      <div>{{SKILLS}}</div>
    </div>
    
    <div class="glass-card">
      <h2 style="color: #1e293b; margin-bottom: 16px;">Projects</h2>
      <div>{{PROJECTS}}</div>
    </div>
    
    <div class="glass-card" style="text-align: center;">
      <h2 style="color: #1e293b; margin-bottom: 16px;">Contact</h2>
      <p style="font-size: 1.1rem;"><a href="mailto:{{EMAIL}}" style="color: #1e293b; text-decoration: none;">{{EMAIL}}</a></p>
    </div>
  </div>
</body>
</html>
