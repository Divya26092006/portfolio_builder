<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>{{NAME}} - Portfolio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: 'Courier New', monospace; 
      background: #000;
      color: #00ff41;
      padding: 40px 20px;
    }
    .retro-container {
      max-width: 900px; margin: 0 auto;
      background: #001100;
      border: 3px solid #00ff41;
      padding: 30px;
    }
    .scanlines::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: repeating-linear-gradient(0deg, rgba(0,255,65,0.03) 0px, transparent 2px, transparent 4px);
      pointer-events: none;
    }
    .retro-title {
      text-align: center;
      font-size: 2.5rem;
      margin-bottom: 20px;
      text-shadow: 0 0 10px #00ff41;
      border-bottom: 2px solid #00ff41;
      padding-bottom: 10px;
    }
    .retro-section {
      background: rgba(0,255,65,0.1);
      border: 2px solid #00ff41;
      border-radius: 0;
      padding: 20px;
      margin-bottom: 20px;
    }
    .retro-tag {
      display: inline-block;
      background: #00ff41;
      color: #000;
      padding: 6px 12px;
      font-weight: bold;
      margin: 4px;
      text-transform: uppercase;
      font-size: 0.8rem;
      box-shadow: 0 0 10px #00ff41;
    }
  </style>
</head>
<body>
  <div class="retro-container">
    <div class="retro-title">{{NAME}}</div>
    <div style="text-align: center; margin-bottom: 30px; font-size: 1.2rem;">{{TAGLINE}}</div>
    
    <div class="retro-section">
      <h2 style="color: #00ff41; margin-bottom: 15px;">ABOUT</h2>
      <p style="line-height: 1.6;">{{ABOUT}}</p>
    </div>
    
    <div class="retro-section">
      <h2 style="color: #00ff41; margin-bottom: 15px;">SKILLS</h2>
      <div>{{SKILLS}}</div>
    </div>
    
    <div class="retro-section">
      <h2 style="color: #00ff41; margin-bottom: 15px;">PROJECTS</h2>
      <div>{{PROJECTS}}</div>
    </div>
    
    <div class="retro-section" style="text-align: center;">
      <h2 style="color: #00ff41; margin-bottom: 15px;">CONTACT</h2>
      <p style="font-size: 1.1rem;">EMAIL: <a href="mailto:{{EMAIL}}" style="color: #00ff41;">{{EMAIL}}</a></p>
    </div>
  </div>
</body>
</html>
